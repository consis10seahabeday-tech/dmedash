<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Status Check</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0056b3;
        }
        #messageDisplay {
            margin-top: 20px;
            font-weight: bold;
            color: #333;
            min-height: 1.5em;
        }
        .error {
            color: #dc3545 !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>System Check</h2>
        <button id="fetchBtn">Fetch Message</button>
        <div id="messageDisplay">Click the button to check status...</div>
    </div>

    <script>
        const btn = document.getElementById('fetchBtn');
        const display = document.getElementById('messageDisplay');

        btn.addEventListener('click', async () => {
            display.textContent = 'Fetching...';
            display.classList.remove('error');

            try {
                const response = await fetch('http://10.105.35.8:8000/check');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                // Assuming the JSON structure is { "message": "your string" }
                display.textContent = data.message || JSON.stringify(data);
                
            } catch (error) {
                console.error('Fetch error:', error);
                display.textContent = 'Error: Could not reach the server.';
                display.classList.add('error');
            }
        });
    </script>
</body>
</html>
